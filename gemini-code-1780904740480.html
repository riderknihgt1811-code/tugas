<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SegarGrocer - Premium Grocery & Fresh Ingredients</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFBF7; }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            green: '#2C5E3B',
                            lightGreen: '#E8F0EA',
                            orange: '#FF6B35',
                            dark: '#1A2E22',
                            cream: '#FDFBF7'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="groceryApp()">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-2 cursor-pointer" @click="activeCategory = 'Semua'">
                    <div class="w-10 h-10 bg-[#2C5E3B] rounded-xl flex items-center justify-center shadow-md shadow-emerald-900/20">
                        <i class="fa-solid fa-leaf text-white text-lg"></i>
                    </div>
                    <span class="text-xl font-bold text-[#1A2E22] tracking-tight">Segar<span class="text-[#FF6B35]">Grocer</span></span>
                </div>

                <div class="hidden md:flex items-center gap-1">
                    <template x-for="cat in categories">
                        <button 
                            @click="activeCategory = cat"
                            :class="activeCategory === cat ? 'bg-[#2C5E3B] text-white shadow-sm' : 'text-gray-600 hover:bg-gray-50'"
                            class="px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 cursor-pointer"
                            x-text="cat">
                        </button>
                    </template>
                </div>

                <div class="flex items-center gap-4">
                    <button @click="cartOpen = true" class="relative w-12 h-12 bg-gray-50 hover:bg-gray-100 rounded-xl flex items-center justify-center transition-colors cursor-pointer">
                        <i class="fa-solid fa-basket-shopping text-gray-700 text-lg"></i>
                        <span x-show="cartCount() > 0" x-text="cartCount()" class="absolute -top-1 -right-1 bg-[#FF6B35] text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold animate-pulse"></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div class="bg-gradient-to-r from-[#2C5E3B] to-[#3D7A4F] rounded-3xl p-8 sm:p-12 relative overflow-hidden shadow-xl shadow-emerald-900/10">
            <div class="max-w-xl relative z-10">
                <span class="bg-white/20 text-white text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full backdrop-blur-sm">Promo Minggu Ini</span>
                <h1 class="text-3xl sm:text-5xl font-bold text-white mt-4 leading-tight">Bahan Makanan Segar, Pengiriman Instan</h1>
                <p class="text-emerald-100/90 mt-4 text-sm sm:text-base">Dapatkan bahan masakan organik berkualitas premium langsung dikirim ke pintu rumah Anda sebelum layu.</p>
            </div>
            <div class="absolute -right-10 -bottom-20 w-96 h-96 bg-white/5 rounded-full blur-2xl"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <div class="flex md:hidden overflow-x-auto gap-2 pb-4 mb-6 -mx-4 px-4 scrollbar-none">
            <template x-for="cat in categories">
                <button 
                    @click="activeCategory = cat"
                    :class="activeCategory === cat ? 'bg-[#2C5E3B] text-white' : 'bg-white text-gray-600 border border-gray-100'"
                    class="px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap shadow-sm"
                    x-text="cat">
                </button>
            </template>
        </div>

        <div class="mb-8">
            <h2 class="text-2xl font-bold text-[#1A2E22]" x-text="activeCategory === 'Semua' ? 'Semua Produk Pilihan' : 'Kategori: ' + activeCategory"></h2>
            <p class="text-gray-400 text-sm mt-1">Bahan segar terlaris pilihan pelanggan kami.</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <template x-for="product in filteredProducts()" :key="product.id">
                <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-direction-col justify-between group">
                    <div class="relative pt-[100%] overflow-hidden bg-gray-50">
                        <img :src="product.image" :alt="product.name" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <span class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm text-[#2C5E3B] text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full shadow-sm" x-text="product.category"></span>
                    </div>
                    
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-1 text-amber-400 text-xs font-semibold">
                                <i class="fa-solid fa-star"></i>
                                <span class="text-gray-700 text-xs" x-text="product.rating"></span>
                            </div>
                            <h3 class="font-bold text-gray-800 mt-2 text-base group-hover:text-[#2C5E3B] transition-colors" x-text="product.name"></h3>
                            <p class="text-gray-400 text-xs mt-0.5" x-text="product.unit"></p>
                        </div>
                        
                        <div class="flex items-center justify-between mt-5">
                            <div>
                                <span class="text-xs text-gray-400 font-medium">Harga</span>
                                <p class="font-bold text-gray-900 text-lg" x-text="formatRupiah(product.price)"></p>
                            </div>
                            <button @click="addToCart(product)" class="bg-[#FF6B35] hover:bg-[#e05621] text-white px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 transition-colors cursor-pointer shadow-md shadow-orange-500/10">
                                <i class="fa-solid fa-plus"></i> Tambah
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" class="fixed inset-0 z-50 overflow-hidden" style="display: none;">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-xs transition-opacity" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 max-w-full flex pl-10">
            <div class="w-screen max-w-md bg-white flex flex-col shadow-2xl">
                <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="text-lg font-bold text-gray-900 flex items-center gap-2">
                        <i class="fa-solid fa-basket-shopping text-[#2C5E3B]"></i> Keranjang Belanja
                    </h2>
                    <button @click="cartOpen = false" class="text-gray-400 hover:text-gray-500 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-50 cursor-pointer">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-6 space-y-4">
                    <p x-show="cart.length === 0" class="text-gray-400 text-center py-12 text-sm">Keranjang Anda masih kosong.</p>
                    
                    <template x-for="item in cart" :key="item.id">
                        <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <img :src="item.image" class="w-16 h-16 object-cover rounded-lg bg-white">
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-800 text-sm" x-text="item.name"></h4>
                                <p class="text-[#2C5E3B] font-bold text-xs mt-1" x-text="formatRupiah(item.price)"></p>
                                <div class="flex items-center gap-2 mt-2">
                                    <button @click="updateQty(item.id, -1)" class="w-6 h-6 bg-white border border-gray-200 rounded flex items-center justify-center text-xs hover:bg-gray-50 cursor-pointer">-</button>
                                    <span class="text-sm font-semibold w-6 text-center" x-text="item.qty"></span>
                                    <button @click="updateQty(item.id, 1)" class="w-6 h-6 bg-white border border-gray-200 rounded flex items-center justify-center text-xs hover:bg-gray-50 cursor-pointer">+</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div x-show="cart.length > 0" class="p-6 border-t border-gray-100 bg-gray-50">
                    <div class="flex justify-between font-bold text-gray-900 text-base mb-4">
                        <span>Total Pembayaran:</span>
                        <span x-text="formatRupiah(cartTotal())" class="text-[#2C5E3B]"></span>
                    </div>
                    <button @click="alert('Terima kasih sudah berbelanja di SegarGrocer!')" class="w-full bg-[#2C5E3B] hover:bg-[#1f452b] text-white py-3.5 rounded-xl font-bold text-sm transition-colors cursor-pointer shadow-lg shadow-emerald-900/10">
                        Selesaikan Pemesanan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function groceryApp() {
            return {
                cartOpen: false,
                activeCategory: 'Semua',
                // Daftar kategori dinamis
                categories: ['Semua', 'Sayuran', 'Buah', 'Daging', 'Seafood', 'Bumbu Dapur', 'Minuman', 'Sembako', 'Frozen Food'],
                cart: [],
                // Data Produk lengkap dengan tambahan Jus, Kopi, Minyak, Tepung, dll.
                products: [
                    { id: 1, name: 'Brokoli Organik Segar', category: 'Sayuran', price: 18500, unit: 'per 500 gram', rating: 4.9, image: 'https://images.unsplash.com/photo-1584270354949-c26b0d5b4a0c?auto=format&fit=crop&q=80&w=500' },
                    { id: 2, name: 'Apel Fuji Premium Red', category: 'Buah', price: 32000, unit: 'per 1 Kg', rating: 4.8, image: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&q=80&w=500' },
                    { id: 3, name: 'Daging Sapi Sirloin Segar', category: 'Daging', price: 85000, unit: 'per 500 gram', rating: 5.0, image: 'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&q=80&w=500' },
                    { id: 4, name: 'Udang Vaname Laut Premium', category: 'Seafood', price: 64000, unit: 'per 500 gram', rating: 4.7, image: 'https://images.unsplash.com/photo-1565680018434-b513d5e5fd47?auto=format&fit=crop&q=80&w=500' },
                    { id: 5, name: 'Bawang Merah & Putih Mix', category: 'Bumbu Dapur', price: 22000, unit: 'per 500 gram', rating: 4.9, image: 'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?auto=format&fit=crop&q=80&w=500' },
                    { id: 6, name: 'Susu UHT Full Cream Cair', category: 'Minuman', price: 19500, unit: '1 Liter', rating: 4.8, image: 'https://images.unsplash.com/photo-1563636619-e9143da7973b?auto=format&fit=crop&q=80&w=500' },
                    
                    // --- PRODUK MINUMAN BARU ---
                    { id: 9, name: 'Jus Jeruk Segar Organik', category: 'Minuman', price: 24500, unit: 'Botol 500 ml', rating: 4.9, image: 'https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&q=80&w=500' },
                    { id: 10, name: 'Kopi Susu Gula Aren Premium', category: 'Minuman', price: 28000, unit: 'Botol 1 Liter', rating: 4.8, image: 'https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&q=80&w=500' },
                    
                    // --- PRODUK SEMBAKO BARU ---
                    { id: 8, name: 'Beras Premium Setra Ramos', category: 'Sembako', price: 78000, unit: 'Kantong 5 Kg', rating: 5.0, image: 'https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=500' },
                    { id: 11, name: 'Minyak Goreng Kelapa Sawit', category: 'Sembako', price: 34500, unit: 'Pouch 2 Liter', rating: 4.7, image: 'https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&q=80&w=500' },
                    { id: 12, name: 'Tepung Terigu Serbaguna', category: 'Sembako', price: 14000, unit: 'Kemasan 1 Kg', rating: 4.6, image: 'https://images.unsplash.com/photo-1574316071802-0d684efa7bf5?auto=format&fit=crop&q=80&w=500' },
                    
                    { id: 7, name: 'Premium Chicken Nugget', category: 'Frozen Food', price: 42000, unit: 'Pack 500 gram', rating: 4.6, image: 'https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&q=80&w=500' }
                ],
                
                // LOGIKA UTAMA NYARING KATEGORI
                filteredProducts() {
                    if (this.activeCategory === 'Semua') {
                        return this.products;
                    }
                    return this.products.filter(p => p.category === this.activeCategory);
                },
                
                addToCart(product) {
                    let found = this.cart.find(item => item.id === product.id);
                    if (found) {
                        found.qty++;
                    } else {
                        this.cart.push({ ...product, qty: 1 });
                    }
                },
                
                updateQty(id, amount) {
                    let found = this.cart.find(item => item.id === id);
                    if (found) {
                        found.qty += amount;
                        if (found.qty <= 0) {
                            this.cart = this.cart.filter(item => item.id !== id);
                        }
                    }
                },
                
                cartCount() {
                    return this.cart.reduce((sum, item) => sum + item.qty, 0);
                },
                
                cartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                },
                
                formatRupiah(angka) {
                    return 'Rp ' + angka.toLocaleString('id-ID');
                }
            }
        }
    </script>
</body>
</html>
